coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: auto
        threshold: 5%

# Coverage is collected from both Linux and Windows runners so that
# platform-specific code paths (#[cfg(unix)] and #[cfg(target_os = "windows")])
# are each instrumented on their native OS.
flags:
  Linux:
    paths:
      - src/
    carryforward: true
  Windows:
    paths:
      - src/
    carryforward: true

ignore:
  - "src/main.rs"
